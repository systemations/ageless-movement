<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1289">
  <defs>
    <linearGradient id="bgL1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#FFF7DE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFC233;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="vignL1" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="paddleL1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="ballL1" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#D0D0D0"/>
    </radialGradient>
    <filter id="shadL1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1300" height="1289" fill="url(#bgL1)"/>
  <circle cx="650" cy="645" r="480" fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.95)" stroke-width="8"/>
  <circle cx="650" cy="645" r="480" fill="url(#vignL1)"/>
  <text x="330" y="840" font-family="Arial Black, system-ui, -apple-system, sans-serif" font-size="700" font-weight="900" fill="#E8A500" filter="url(#shadL1)">1</text>
  <g filter="url(#shadL1)">
    <g transform="translate(720,690) rotate(-12)">
      <rect x="-16" y="95" width="32" height="160" rx="10" fill="#2d2d44"/>
      <rect x="-11" y="102" width="22" height="146" rx="7" fill="#3d3d5c"/>
      <ellipse cx="0" cy="0" rx="140" ry="165" fill="url(#paddleL1)" stroke="#444" stroke-width="3"/>
      <circle cx="-65" cy="-65" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="0" cy="-65" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="65" cy="-65" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="-32" cy="-20" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="32" cy="-20" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="-65" cy="28" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="0" cy="28" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="65" cy="28" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="-32" cy="-110" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="32" cy="-110" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
    </g>
    <!-- Yellow pickleball with motion trail -->
    <g transform="translate(900, 465)">
      <line x1="55" y1="-20" x2="120" y2="-36" stroke="#C9A500" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
      <line x1="58" y1="8" x2="115" y2="14" stroke="#C9A500" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
      <circle cx="0" cy="0" r="70" fill="url(#ballL1)" stroke="#B0B0B0" stroke-width="3"/>
      <circle cx="-22" cy="-22" r="6" fill="rgba(90,90,90,0.45)"/>
      <circle cx="18" cy="-28" r="6" fill="rgba(90,90,90,0.45)"/>
      <circle cx="30" cy="10" r="6" fill="rgba(90,90,90,0.45)"/>
      <circle cx="-8" cy="16" r="6" fill="rgba(90,90,90,0.45)"/>
      <circle cx="-30" cy="8" r="6" fill="rgba(90,90,90,0.45)"/>
      <circle cx="8" cy="-8" r="6" fill="rgba(90,90,90,0.45)"/>
      <circle cx="22" cy="28" r="6" fill="rgba(90,90,90,0.45)"/>
      <circle cx="-18" cy="32" r="6" fill="rgba(90,90,90,0.45)"/>
    </g>
  </g>
  <!-- MOBILITY label -->
  <text x="650" y="1180" text-anchor="middle" font-family="Arial Black, system-ui, sans-serif" font-size="92" font-weight="900" fill="#E8A500" letter-spacing="6">MOBILITY</text>
</svg>
