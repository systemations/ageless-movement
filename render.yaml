services:
  - type: web
    name: ageless-movement
    runtime: node
    plan: starter
    buildCommand: cd client && npm install && npx vite build && cd ../server && npm install
    startCommand: cd server && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 3001
    disk:
      name: data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
