<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1289">
  <defs>
    <linearGradient id="bgH2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#E6F4FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4AA5F0;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="vignH2" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="paddleH2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="ballH2" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFF176"/>
      <stop offset="100%" style="stop-color:#E8C400"/>
    </radialGradient>
    <filter id="shadH2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1300" height="1289" fill="url(#bgH2)"/>
  <circle cx="650" cy="645" r="480" fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.95)" stroke-width="8"/>
  <circle cx="650" cy="645" r="480" fill="url(#vignH2)"/>
  <text x="180" y="840" font-family="Arial Black, system-ui, -apple-system, sans-serif" font-size="700" font-weight="900" fill="#1F8FE5" filter="url(#shadH2)">2</text>
  <g filter="url(#shadH2)">
    <!-- Crossed paddles -->
    <g transform="translate(680,690) rotate(-28)">
      <rect x="-14" y="95" width="28" height="150" rx="8" fill="#2d2d44"/>
      <rect x="-10" y="102" width="20" height="136" rx="6" fill="#3d3d5c"/>
      <ellipse cx="0" cy="0" rx="115" ry="135" fill="url(#paddleH2)" stroke="#444" stroke-width="3"/>
      <circle cx="-50" cy="-50" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="0" cy="-50" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="50" cy="-50" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="-25" cy="-12" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="25" cy="-12" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="-50" cy="26" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="0" cy="26" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="50" cy="26" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
    </g>
    <g transform="translate(770,690) rotate(28)">
      <rect x="-14" y="95" width="28" height="150" rx="8" fill="#2d2d44"/>
      <rect x="-10" y="102" width="20" height="136" rx="6" fill="#3d3d5c"/>
      <ellipse cx="0" cy="0" rx="115" ry="135" fill="url(#paddleH2)" stroke="#444" stroke-width="3"/>
      <circle cx="-50" cy="-50" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="0" cy="-50" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="50" cy="-50" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="-25" cy="-12" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="25" cy="-12" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="-50" cy="26" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="0" cy="26" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <circle cx="50" cy="26" r="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
    </g>
    <!-- Yellow pickleball at intersection above -->
    <g transform="translate(725, 470)">
      <circle cx="0" cy="0" r="68" fill="url(#ballH2)" stroke="#C9A500" stroke-width="3"/>
      <circle cx="-22" cy="-22" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="18" cy="-28" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="30" cy="10" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="-8" cy="16" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="-30" cy="8" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="8" cy="-8" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="22" cy="28" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="-18" cy="32" r="6" fill="rgba(145,110,0,0.55)"/>
    </g>
  </g>
  <!-- House icon + HOME label -->
  <g transform="translate(1070,690)">
    <path d="M -80 12 L 0 -72 L 80 12 L 80 72 L -80 72 Z" fill="#1F8FE5" stroke="#1F8FE5" stroke-width="4" stroke-linejoin="round"/>
    <rect x="-22" y="25" width="44" height="47" fill="white"/>
    <rect x="30" y="-25" width="18" height="28" fill="white" opacity="0.7"/>
    <text x="0" y="150" text-anchor="middle" font-family="Arial Black, system-ui, sans-serif" font-size="56" font-weight="900" fill="#1F8FE5" letter-spacing="4">HOME</text>
