<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1289">
  <defs>
    <linearGradient id="bgG3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#FFE5E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EC4747;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="vignG3" cx="50%" cy="50%" r="55%">
