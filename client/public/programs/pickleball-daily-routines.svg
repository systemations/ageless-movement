<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1289">
  <defs>
    <linearGradient id="bgD" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#E8FAF0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4FD88E;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="vignD" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="paddleD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="ballD" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFF176"/>
      <stop offset="100%" style="stop-color:#E8C400"/>
    </radialGradient>
    <filter id="shadD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1300" height="1289" fill="url(#bgD)"/>
  <circle cx="650" cy="645" r="480" fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.95)" stroke-width="8"/>
  <circle cx="650" cy="645" r="480" fill="url(#vignD)"/>
  <text x="180" y="840" font-family="Arial Black, system-ui, -apple-system, sans-serif" font-size="700" font-weight="900" fill="#15B45C" filter="url(#shadD)">1</text>
  <!-- Paddle + ball (center) -->
  <g filter="url(#shadD)">
    <!-- Paddle -->
    <g transform="translate(720,680) rotate(-8)">
      <rect x="-16" y="95" width="32" height="160" rx="10" fill="#2d2d44"/>
      <rect x="-11" y="102" width="22" height="146" rx="7" fill="#3d3d5c"/>
      <ellipse cx="0" cy="0" rx="140" ry="165" fill="url(#paddleD)" stroke="#444" stroke-width="3"/>
      <circle cx="-65" cy="-65" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="0" cy="-65" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="65" cy="-65" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="-32" cy="-20" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="32" cy="-20" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="-65" cy="28" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="0" cy="28" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="65" cy="28" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="-32" cy="-110" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="32" cy="-110" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
      <circle cx="0" cy="72" r="9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5"/>
    </g>
    <!-- Yellow pickleball top-right of paddle -->
    <g transform="translate(885, 475)">
      <circle cx="0" cy="0" r="70" fill="url(#ballD)" stroke="#C9A500" stroke-width="3"/>
      <circle cx="-22" cy="-22" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="18" cy="-28" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="30" cy="10" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="-8" cy="16" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="-30" cy="8" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="8" cy="-8" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="22" cy="28" r="6" fill="rgba(145,110,0,0.55)"/>
      <circle cx="-18" cy="32" r="6" fill="rgba(145,110,0,0.55)"/>
    </g>
  </g>
  <!-- Right-side icon + label: sprout -->
  <g transform="translate(1070,690)">
    <ellipse cx="-30" cy="-16" rx="34" ry="54" transform="rotate(-28 -30 -16)" fill="#15B45C"/>
    <ellipse cx="30" cy="-16" rx="34" ry="54" transform="rotate(28 30 -16)" fill="#15B45C"/>
    <path d="M 0 62 L 0 -14" stroke="#0F8A46" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M -66 70 Q 0 42 66 70" stroke="#0F8A46" stroke-width="12" fill="none" stroke-linecap="round"/>
    <text x="0" y="150" text-anchor="middle" font-family="Arial Black, system-ui, sans-serif" font-size="56" font-weight="900" fill="#15B45C" letter-spacing="4">DAILY</text>
  </g>
</svg>
