<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1289">
  <defs>
    <linearGradient id="bgKB1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#FFF7DE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFC233;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="vignKB1" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bellKB1" cx="38%" cy="32%" r="75%">
      <stop offset="0%" style="stop-color:#3a3a55"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </radialGradient>
    <filter id="shadKB1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1300" height="1289" fill="url(#bgKB1)"/>
  <circle cx="650" cy="645" r="480" fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.95)" stroke-width="8"/>
  <circle cx="650" cy="645" r="480" fill="url(#vignKB1)"/>
  <text x="300" y="840" font-family="Arial Black, system-ui, -apple-system, sans-serif" font-size="700" font-weight="900" fill="#E8A500" filter="url(#shadKB1)">1</text>
  <!-- Kettlebell -->
  <g transform="translate(800,600)" filter="url(#shadKB1)">
    <!-- handle -->
    <path d="M -78 -50 C -78 -150, 78 -150, 78 -50" fill="none" stroke="#2d2d44" stroke-width="34" stroke-linecap="round"/>
    <path d="M -78 -50 C -78 -150, 78 -150, 78 -50" fill="none" stroke="#3d3d5c" stroke-width="18" stroke-linecap="round"/>
    <!-- bell body -->
    <path d="M -60 -60 C -150 -10, -150 200, 0 200 C 150 200, 150 -10, 60 -60 Z" fill="url(#bellKB1)" stroke="#444" stroke-width="3"/>
    <!-- highlight -->
    <ellipse cx="-45" cy="40" rx="38" ry="55" fill="rgba(255,255,255,0.10)"/>
  </g>
  <!-- KETTLEBELL label -->
  <text x="650" y="1175" text-anchor="middle" font-family="Arial Black, system-ui, sans-serif" font-size="80" font-weight="900" fill="#E8A500" letter-spacing="4">KETTLEBELL</text>
</svg>
